name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish WGS/WGS.csproj -c Release -r win-x64 --self-contained false -o publish_out

      - name: Create ZIP (Python)
        run: |
          python -c "
          import zipfile, pathlib
          tag = '${{ github.ref_name }}'
          src = pathlib.Path('publish_out')
          dst = f'WGS-{tag}.zip'
          with zipfile.ZipFile(dst, 'w', zipfile.ZIP_DEFLATED) as z:
              z.write(src / 'WindowsGameServer.exe', 'WindowsGameServer.exe')
              z.write('LICENSE', 'LICENSE')
              z.write('README.md', 'README.md')
          print(f'Created {dst}')
          "

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: Windows Game Server ${{ github.ref_name }}
          generate_release_notes: true
          files: WGS-${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
